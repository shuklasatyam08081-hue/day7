<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Flow</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --primary-blue: #4f46e5;
            --accent-red: #ef4444;
            --text-main: #1f2937;
            --card-white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .app-wrapper {
            background: var(--card-white);
            width: 90%;
            max-width: 420px;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        .input-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        #taskInput {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
        }

        #taskInput:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }

        #addBtn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        #taskList {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            transition: transform 0.1s ease;
        }

        .task-item:hover {
            background: #f3f4f6;
        }

        .task-content {
            flex-grow: 1;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .done .task-content {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .remove-icon {
            color: #d1d5db;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .remove-icon:hover {
            color: var(--accent-red);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <h1>My Daily Tasks</h1>
        </header>

        <div class="input-bar">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button id="addBtn">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>
